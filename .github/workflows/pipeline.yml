name: E2E Tests

on:
  push:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build backend-prod image
        working-directory: ./shopping-backend
        run: docker build -t backend-prod -f Dockerfile .

      - name: Build frontend-prod image
        run: docker build -t frontend-prod -f ./shoppingcartDockerfile ./shoppingcart

      - name: Start Shoppingcart with Docker Compose
        working-directory: ./
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for nginx to be ready on port 8080..."
          timeout 120 bash -c 'until curl -f http://localhost:8080 > /dev/null 2>&1; do sleep 2; done'
          echo "Services are ready!"
          
      - name: Check running containers
        run: docker ps

      - name: Install dependencies
        working-directory: ./tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./tests
        run: npx playwrigth tests

      - name: Show container logs on failure
        if: failure()
        working-directory: ./
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend-prod
          echo "=== Frontend logs ==="
          docker compose logs frontend-prod
          echo "=== Nginx logs ==="
          docker compose logs nginx

      - name: Clean up Docker containers
        if: always()
        working-directory: ./
        run: docker compose down -v